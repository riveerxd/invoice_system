services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: invoices
      POSTGRES_USER: invoices
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoices"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://invoices:${DB_PASSWORD:-secret}@postgres:5432/invoices
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - backend

volumes:
  pgdata:
